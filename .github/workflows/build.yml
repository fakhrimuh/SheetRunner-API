name: Build & Release

# Trigger: when you push a tag like v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  # --- Build the Mac app ---
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build .app with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name ExcelAPI \
            --paths . \
            --hidden-import=openpyxl \
            --hidden-import=pandas \
            --hidden-import=jsonpath_ng \
            --hidden-import=jsonpath_ng.ext \
            apps/app.py

      - name: Zip the .app bundle
        run: |
          cd dist
          zip -ry ExcelAPI-macOS.zip ExcelAPI.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelAPI-macOS
          path: dist/ExcelAPI-macOS.zip

  # --- Build the Windows .exe ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name ExcelAPI `
            --paths . `
            --hidden-import=openpyxl `
            --hidden-import=pandas `
            --hidden-import=jsonpath_ng `
            --hidden-import=jsonpath_ng.ext `
            apps/app.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelAPI-Windows
          path: dist/ExcelAPI.exe

  # --- Create the GitHub Release and attach both builds ---
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: ExcelAPI-macOS
          path: ./release

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ExcelAPI-Windows
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/ExcelAPI-macOS.zip
            ./release/ExcelAPI.exe
          generate_release_notes: true
